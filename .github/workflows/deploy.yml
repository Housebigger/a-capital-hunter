name: Deploy to GitHub Pages

on:
  schedule:
    # 12:00 UTC = 20:00 CST on weekdays, safely after A-share EOD data publishes.
    - cron: "0 12 * * 1-5"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "image_log/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          python -m pip install -r server/requirements.txt
          npm ci

      - name: Sync capital-flow snapshots (last 20 trading days)
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          CAPITAL_FLOW_SOURCE: tushare
        run: python -m server.capital_flow.sync --backfill 20

      - name: Export static data
        run: python scripts/export_static_data.py

      - name: Build site
        run: npm run build:pages

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
